<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% seo %}
  <link rel="icon" href="{{ '/assets/icon.svg' | relative_url }}" type="image/svg+xml" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #0a0a0f;
      color: #e6e6e6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .markdown-body {
      box-sizing: border-box;
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 24px 96px;
      background: transparent;
    }
    .markdown-body a { color: #22d3ee; }
    .markdown-body a:hover { color: #a855f7; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      border-bottom-color: #1f1f2e;
    }
    .markdown-body code, .markdown-body pre {
      background: #111118 !important;
    }
    .markdown-body table tr { background: transparent; border-top-color: #1f1f2e; }
    .markdown-body table tr:nth-child(2n) { background: #0f0f17; }
    .markdown-body table th, .markdown-body table td { border-color: #1f1f2e; }
  </style>
</head>
<body>
  <article class="markdown-body">
    {{ content }}
  </article>
</body>
</html>
